    <script>
      // Global Reveal System
      const revealObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('active');
          }
        });
      }, { threshold: 0.1 });

      const observeAll = () => {
        document.querySelectorAll('.section-reveal:not(.observed)').forEach(el => {
          revealObserver.observe(el);
          el.classList.add('observed');
        });
      };

      // Watch for dynamically injected sections
      const domObserver = new MutationObserver(() => observeAll());
      domObserver.observe(document.body, { childList: true, subtree: true });

      window.addEventListener('load', () => {
        observeAll();
        // Hide preloader after a graceful delay
        setTimeout(() => {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            setTimeout(() => preloader.remove(), 800);
